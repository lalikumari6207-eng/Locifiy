<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Locify App</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f4f4;
    }.center {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  flex-direction: column;
}

.hidden { display: none; }

.splash {
  background: black;
  color: white;
  font-size: 30px;
  font-weight: bold;
  cursor: pointer;
}

input, button {
  padding: 10px;
  margin: 5px;
  width: 80%;
  max-width: 300px;
}

button {
  background: black;
  color: white;
  border: none;
  cursor: pointer;
}

.card {
  background: white;
  margin: 10px;
  padding: 10px;
  border-radius: 10px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.2);
  cursor: pointer;
}

.container {
  padding: 10px;
}

.topbar {
  background: #111;
  color: white;
  padding: 15px;
  font-size: 18px;
}

.detail img {
  width: 100%;
  border-radius: 10px;
}

a {
  display: block;
  margin-top: 10px;
  color: blue;
}

  </style>
</head>
<body><!-- SPLASH SCREEN --><div id="splash" class="center splash" onclick="startApp()">
  Locify
</div><!-- ONBOARDING --><div id="onboard" class="center hidden">
  <h2>Welcome to Locify</h2>
  <input id="name" placeholder="Enter your name" />
  <input id="state" placeholder="Enter your state" />
  <input id="city" placeholder="Enter your city" />
  <button onclick="goHome()">Enter Locify</button>
</div><!-- HOME --><div id="home" class="hidden">
  <div class="topbar" id="welcome"></div>
  <div class="container">
    <input id="search" placeholder="Search shops, schools..." onkeyup="renderList()" />
    <div id="list"></div>
  </div>
</div><!-- DETAIL --><div id="detail" class="hidden container"></div><script>
const data = [
  {id:1,type:"Cloth Shop",name:"Trendz Fashion",city:"Muzaffarpur",state:"Bihar",phone:"9876543210",img:"https://images.unsplash.com/photo-1521334884684-d80222895322"},
  {id:2,type:"School",name:"Bright Future School",city:"Muzaffarpur",state:"Bihar",phone:"9123456780",img:"https://images.unsplash.com/photo-1523050854058-8df90110c9f1"},
  {id:3,type:"Shoes Shop",name:"Urban Shoes Hub",city:"Patna",state:"Bihar",phone:"9988776655",img:"https://images.unsplash.com/photo-1528701800489-20be3c2eaebf"}
];

let user = {};

function startApp(){
  document.getElementById('splash').classList.add('hidden');
  document.getElementById('onboard').classList.remove('hidden');
}

function goHome(){
  user.name = document.getElementById('name').value;
  user.state = document.getElementById('state').value;
  user.city = document.getElementById('city').value;

  document.getElementById('onboard').classList.add('hidden');
  document.getElementById('home').classList.remove('hidden');

  document.getElementById('welcome').innerText =
    `Hi ${user.name} 👋 | ${user.city}, ${user.state}`;

  renderList();
}

function renderList(){
  let search = document.getElementById('search').value.toLowerCase();
  let list = document.getElementById('list');
  list.innerHTML = "";

  let filtered = data.filter(d => 
    d.city.toLowerCase() === user.city.toLowerCase() &&
    d.state.toLowerCase() === user.state.toLowerCase() &&
    (d.name.toLowerCase().includes(search) || d.type.toLowerCase().includes(search))
  );

  filtered.forEach(item => {
    list.innerHTML += `
      <div class="card" onclick="openDetail(${item.id})">
        <b>${item.name}</b><br/>
        <small>${item.type}</small><br/>
        <small>${item.city}, ${item.state}</small>
      </div>
    `;
  });
}

function openDetail(id){
  let item = data.find(d => d.id === id);

  document.getElementById('home').classList.add('hidden');
  document.getElementById('detail').classList.remove('hidden');

  document.getElementById('detail').innerHTML = `
    <button onclick="backHome()">⬅ Back</button>
    <h2>${item.name}</h2>
    <img src="${item.img}" />
    <p>${item.type}</p>
    <p>${item.city}, ${item.state}</p>
    <a href="tel:${item.phone}">Call Now</a>
    <a href="https://maps.google.com" target="_blank">Open Map</a>
  `;
}

function backHome(){
  document.getElementById('detail').classList.add('hidden');
  document.getElementById('home').classList.remove('hidden');
}
</script></body>
</html>
